services:
  - name: storyflow-web
    type: web
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 18.20.8
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@storyflow.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Admin StoryFlow
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: storyflow-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
